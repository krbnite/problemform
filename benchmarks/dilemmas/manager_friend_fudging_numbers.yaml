name: manager_friend_fudging_numbers
formulation_type: dilemma
category: dilemma
raw_formulation: >
  My best friend is my manager. I just re-analyzed his spreadsheets and found
  that he's been fudging the numbers for over a year. I think this is unethical
  and would report it immediately if it was anyone else I worked with, but I'm
  hesitant to ruin my friend's life. What should I do?
tags:
  - dilemma
  - ethics
  - m3b_beta
expected_properties: []
notes: >
  An ethical dilemma involving competing values: loyalty to a friend versus
  professional integrity and responsibility. Tests whether ProblemForm exposes
  the underlying value conflict and relevant considerations rather than jumping
  directly to a recommendation.